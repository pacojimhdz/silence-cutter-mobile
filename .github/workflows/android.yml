name: Compilar APK Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Configurar entorno Android SDK e instalar build-tools
      uses: android-actions/setup-android@v3

    - name: Instalar herramientas de empaquetado Cordova/Capacitor CLI
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android

    - name: Generar estructura nativa limpia
      run: |
        echo '{"name": "silence-cutter", "version": "1.0.0", "dependencies": {}, "devDependencies": {}}' > package.json
        npx cap init "Silence Cutter" "com.bigfrank.silencecutter" --web-dir=www
        npx cap add android
        npx cap sync android

    - name: Compilar APK directa omitiendo conflictos de Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m --add-exports=java.base/sun.security.x509=ALL-UNNAMED"

    - name: Subir APK final como artefacto descargable
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
