name: Compilar APK Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Crear archivo package.json base para Capacitor
      run: |
        echo '{"name": "silence-cutter", "version": "1.0.0", "dependencies": {}, "devDependencies": {}}' > package.json

    - name: Instalar dependencias de Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Inicializar configuracion de Capacitor
      run: |
        npx cap init "Silence Cutter" "com.bigfrank.silencecutter" --web-dir=www

    - name: Agregar plataforma Android nativa
      run: |
        npx cap add android

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3

    - name: Sincronizar codigo web con el entorno Android
      run: |
        npx cap sync android

    - name: Compilar APK en modo Debug con Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Subir APK final como artefacto descargable
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
