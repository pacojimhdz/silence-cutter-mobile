name: Compilar APK Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3

    - name: Instalar dependencias del proyecto
      run: npm install

    - name: Instalar plugin selector de videos
      run: npm install @capawesome/capacitor-file-picker

    - name: Inicializar configuracion de Capacitor
      run: npx cap init "Silence Cutter" "com.bigfrank.silencecutter" --web-dir=www

    - name: Agregar plataforma Android nativa
      run: npx cap add android

    - name: Sincronizar codigo web con el entorno Android
      run: npx cap sync android

    - name: Inyectar permisos de lectura de almacenamiento
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<application/i \
